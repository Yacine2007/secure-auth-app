<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="google" content="notranslate">
    <title>B.Y PRO - Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #000000; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .container { width: 100%; max-width: 400px; }
        .card { background: #ffffff; border-radius: 28px; padding: 24px 20px; box-shadow: 0 15px 30px rgba(255, 255, 255, 0.03); border: 1px solid #e0e0e0; max-height: 85vh; overflow-y: auto; }
        .card::-webkit-scrollbar { width: 4px; }
        .card::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 4px; }
        .card::-webkit-scrollbar-thumb { background: #2a6df4; border-radius: 4px; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .logo-img { width: 40px; height: 40px; margin-bottom: 8px; }
        .brand-black { font-size: 20px; font-weight: 600; color: #000000; }
        .brand-account { font-size: 20px; font-weight: 600; color: #2a6df4; margin-left: 4px; }
        .subtitle { color: #4a4a4a; font-size: 12px; margin-top: 4px; }
        
        /* Progress Bar */
        .progress-container { margin: 16px 0 20px; }
        .progress-steps { display: flex; justify-content: space-between; position: relative; }
        .progress-step { width: 32px; height: 32px; background: #e0e0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; color: #666; z-index: 2; transition: all 0.3s; }
        .progress-step.active { background: #2a6df4; color: white; box-shadow: 0 0 0 3px rgba(42,109,244,0.2); }
        .progress-step.completed { background: #000000; color: white; }
        .progress-line { position: absolute; top: 15px; left: 16px; right: 16px; height: 2px; background: #e0e0e0; z-index: 1; }
        
        /* Step Content */
        .step { display: none; animation: fadeIn 0.2s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 12px; font-weight: 500; color: #333; margin-bottom: 6px; }
        label i { color: #2a6df4; margin-right: 5px; font-size: 12px; }
        input { width: 100%; padding: 12px 16px; border: 1.5px solid #e0e0e0; border-radius: 30px; font-size: 14px; background: white; transition: 0.2s; }
        input:focus { outline: none; border-color: #2a6df4; box-shadow: 0 0 0 2px rgba(42,109,244,0.1); }
        
        .password-wrapper { position: relative; }
        .eye-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #999; font-size: 14px; }
        
        /* Avatar Upload - Circular */
        .avatar-container { display: flex; flex-direction: column; align-items: center; margin: 15px 0 10px; }
        .avatar-circle { width: 90px; height: 90px; border-radius: 50%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; border: 2px dashed #ccc; transition: all 0.2s; margin-bottom: 10px; }
        .avatar-circle:hover { border-color: #2a6df4; background: #f0f0f0; }
        .avatar-circle i { font-size: 32px; color: #999; }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-circle.has-image { border: 2px solid #2a6df4; }
        .avatar-label { font-size: 11px; color: #666; cursor: pointer; }
        .avatar-label i { font-size: 11px; color: #2a6df4; }
        .skip-avatar { font-size: 11px; color: #999; margin-top: 6px; cursor: pointer; text-decoration: underline; }
        
        .btn-next { width: 100%; padding: 12px; background: #000000; color: white; border: none; border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
        .btn-next:hover { background: #2a6df4; }
        .btn-next:disabled { background: #ccc; cursor: not-allowed; }
        .btn-secondary { width: 100%; padding: 10px; background: white; color: #333; border: 1.5px solid #e0e0e0; border-radius: 40px; font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
        .btn-secondary:hover { background: #f5f5f5; border-color: #2a6df4; }
        
        .error { color: #e74c3c; font-size: 11px; margin-top: 6px; text-align: center; }
        
        /* Result Box - محسن */
        .result-box { text-align: center; padding: 8px 0; }
        .result-box i { font-size: 36px; color: #2a6df4; margin-bottom: 8px; }
        .result-box h3 { font-size: 18px; margin-bottom: 12px; font-weight: 600; }
        .user-id-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .user-id { font-size: 20px; font-weight: 700; color: #2a6df4; background: #f8fafd; padding: 6px 16px; border-radius: 40px; display: inline-block; margin: 6px 0; letter-spacing: 0.5px; word-break: break-all; }
        .qr-container { background: white; padding: 10px; border-radius: 16px; display: inline-block; margin: 8px 0; border: 1px solid #e0e0e0; }
        .qr-container canvas { width: 110px; height: 110px; }
        .result-actions { display: flex; gap: 10px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
        .result-actions .btn-secondary { width: auto; padding: 8px 16px; font-size: 12px; margin: 0; background: white; border: 1.5px solid #e0e0e0; }
        .result-actions .btn-next { width: auto; padding: 8px 16px; font-size: 12px; margin: 0; }
        .link { color: #2a6df4; text-decoration: none; display: inline-block; margin-top: 12px; font-size: 12px; }
        .hidden { display: none; }
        .loading-spinner { width: 16px; height: 16px; border: 2px solid white; border-top-color: #2a6df4; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* زر رجوع صغير */
        .back-link { text-align: center; margin-top: 12px; }
        .back-link a { color: #999; font-size: 12px; text-decoration: none; }
    </style>
</head>
<body translate="no">
    <div class="container">
        <div class="card">
            <div class="header">
                <img src="https://by-pro.kesug.com/B.Y%20PRO.png" class="logo-img" onerror="this.style.display='none'">
                <div><span class="brand-black">B.Y PRO</span><span class="brand-account">Account</span></div>
                <div class="subtitle">Create your account</div>
            </div>

            <!-- Progress Steps -->
            <div class="progress-container">
                <div class="progress-steps">
                    <div class="progress-step" id="step1Indicator">1</div>
                    <div class="progress-step" id="step2Indicator">2</div>
                    <div class="progress-step" id="step3Indicator">3</div>
                    <div class="progress-step" id="step4Indicator">4</div>
                    <div class="progress-line"></div>
                </div>
            </div>

            <!-- Step 1: Username -->
            <div class="step active" id="step1">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="e.g. john_doe" autocomplete="off">
                </div>
                <div id="error1" class="error"></div>
                <button class="btn-next" onclick="nextStep(1)">Continue <i class="fas fa-arrow-right"></i></button>
            </div>

            <!-- Step 2: Email -->
            <div class="step" id="step2">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="off">
                </div>
                <div id="error2" class="error"></div>
                <button class="btn-next" onclick="nextStep(2)">Continue <i class="fas fa-arrow-right"></i></button>
                <button class="btn-secondary" onclick="prevStep(2)"><i class="fas fa-arrow-left"></i> Back</button>
            </div>

            <!-- Step 3: Password -->
            <div class="step" id="step3">
                <div class="form-group">
                    <label><i class="fas fa-key"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Create a strong password" autocomplete="new-password">
                        <i class="fas fa-eye-slash eye-icon" id="togglePassword"></i>
                    </div>
                </div>
                <div id="error3" class="error"></div>
                <button class="btn-next" onclick="nextStep(3)">Continue <i class="fas fa-arrow-right"></i></button>
                <button class="btn-secondary" onclick="prevStep(3)"><i class="fas fa-arrow-left"></i> Back</button>
            </div>

            <!-- Step 4: Avatar -->
            <div class="step" id="step4">
                <div class="avatar-container">
                    <div class="avatar-circle" id="avatarCircle" onclick="document.getElementById('avatarInput').click()">
                        <i class="fas fa-camera"></i>
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" style="display:none">
                    <div class="avatar-label"><i class="fas fa-cloud-upload-alt"></i> Click to upload photo</div>
                    <div class="skip-avatar" id="skipAvatar">Skip (use default)</div>
                </div>
                <div id="error4" class="error"></div>
                <button class="btn-next" id="createAccountBtn">Create Account <i class="fas fa-user-plus"></i></button>
                <button class="btn-secondary" onclick="prevStep(4)"><i class="fas fa-arrow-left"></i> Back</button>
            </div>

            <!-- Result Step -->
            <div class="step" id="stepResult">
                <div class="result-box">
                    <i class="fas fa-check-circle"></i>
                    <h3>Account Created!</h3>
                    <div class="user-id-label">YOUR ACCOUNT ID</div>
                    <div class="user-id" id="displayId"></div>
                    <div class="qr-container" id="qrcode"></div>
                    <p style="font-size: 10px; color: #999; margin: 5px 0;">Scan to login instantly</p>
                    <div class="result-actions">
                        <button class="btn-secondary" id="saveQRBtn"><i class="fas fa-download"></i> Save QR</button>
                        <button class="btn-next" id="loginBtn" style="margin:0;">Login <i class="fas fa-sign-in-alt"></i></button>
                    </div>
                </div>
                <div class="back-link">
                    <a href="login.html">Already have an account? Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://b-y-pro-acounts-login.onrender.com';
        const INTERNAL_KEY = 'bypro-internal-key-2025';
        
        let currentStep = 1;
        let userData = { username: '', email: '', password: '' };
        let avatarFile = null;
        
        // DOM Elements
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        const step4 = document.getElementById('step4');
        const stepResult = document.getElementById('stepResult');
        const indicators = {
            1: document.getElementById('step1Indicator'),
            2: document.getElementById('step2Indicator'),
            3: document.getElementById('step3Indicator'),
            4: document.getElementById('step4Indicator')
        };
        
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const avatarCircle = document.getElementById('avatarCircle');
        const avatarInput = document.getElementById('avatarInput');
        const skipAvatar = document.getElementById('skipAvatar');
        const createBtn = document.getElementById('createAccountBtn');
        const displayIdSpan = document.getElementById('displayId');
        const qrcodeDiv = document.getElementById('qrcode');
        const saveQRBtn = document.getElementById('saveQRBtn');
        const loginBtn = document.getElementById('loginBtn');
        
        const error1 = document.getElementById('error1');
        const error2 = document.getElementById('error2');
        const error3 = document.getElementById('error3');
        const error4 = document.getElementById('error4');
        
        // Toggle Password
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
        
        // Avatar upload
        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.match('image.*')) {
                error4.textContent = 'Please select an image file';
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                error4.textContent = 'Image max 5MB';
                return;
            }
            avatarFile = file;
            const reader = new FileReader();
            reader.onload = (ev) => {
                avatarCircle.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
                avatarCircle.classList.add('has-image');
            };
            reader.readAsDataURL(file);
        });
        
        skipAvatar.addEventListener('click', () => {
            avatarFile = null;
            avatarCircle.innerHTML = '<i class="fas fa-camera"></i>';
            avatarCircle.classList.remove('has-image');
            error4.textContent = '';
        });
        
        function updateProgress(step) {
            for (let i = 1; i <= 4; i++) {
                if (i < step) {
                    indicators[i].classList.add('completed');
                    indicators[i].classList.remove('active');
                } else if (i === step) {
                    indicators[i].classList.add('active');
                    indicators[i].classList.remove('completed');
                } else {
                    indicators[i].classList.remove('active', 'completed');
                }
            }
        }
        
        function showStep(step) {
            step1.classList.remove('active');
            step2.classList.remove('active');
            step3.classList.remove('active');
            step4.classList.remove('active');
            stepResult.classList.remove('active');
            
            if (step === 1) step1.classList.add('active');
            else if (step === 2) step2.classList.add('active');
            else if (step === 3) step3.classList.add('active');
            else if (step === 4) step4.classList.add('active');
            else if (step === 5) stepResult.classList.add('active');
            
            updateProgress(step);
            currentStep = step;
        }
        
        function validateStep(step) {
            if (step === 1) {
                const val = usernameInput.value.trim();
                if (!val) { error1.textContent = 'Username required'; return false; }
                if (val.length < 3) { error1.textContent = 'At least 3 characters'; return false; }
                userData.username = val;
                error1.textContent = '';
                return true;
            }
            if (step === 2) {
                const val = emailInput.value.trim();
                if (!val) { error2.textContent = 'Email required'; return false; }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) { error2.textContent = 'Invalid email'; return false; }
                userData.email = val;
                error2.textContent = '';
                return true;
            }
            if (step === 3) {
                const val = passwordInput.value.trim();
                if (!val) { error3.textContent = 'Password required'; return false; }
                if (val.length < 6) { error3.textContent = 'Minimum 6 characters'; return false; }
                userData.password = val;
                error3.textContent = '';
                return true;
            }
            return true;
        }
        
        function nextStep(step) {
            if (validateStep(step)) {
                showStep(step + 1);
            }
        }
        
        function prevStep(step) {
            showStep(step - 1);
        }
        
        async function uploadAvatar(accountId) {
            if (!avatarFile) return null;
            const formData = new FormData();
            formData.append('avatar', avatarFile);
            try {
                const response = await fetch(`${API_BASE}/api/accounts/${accountId}/avatar`, {
                    method: 'POST',
                    headers: { 'x-api-key': INTERNAL_KEY },
                    body: formData
                });
                const data = await response.json();
                if (data.success) return data.avatarUrl;
                return null;
            } catch (error) {
                console.error('Avatar upload error:', error);
                return null;
            }
        }
        
        async function createAccount() {
            if (!validateStep(3)) {
                showStep(3);
                return;
            }
            
            createBtn.innerHTML = '<div class="loading-spinner"></div> Creating...';
            createBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/api/create-account`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: userData.username,
                        email: userData.email,
                        password: userData.password
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const userId = result.account.id;
                    
                    if (avatarFile) {
                        await uploadAvatar(userId);
                    }
                    
                    displayIdSpan.textContent = userId;
                    const qrText = `BYPRO:${userId}:${userData.password}`;
                    qrcodeDiv.innerHTML = '';
                    new QRCode(qrcodeDiv, {
                        text: qrText,
                        width: 110,
                        height: 110,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    
                    showStep(5);
                } else {
                    error4.textContent = result.error || 'Failed to create account';
                }
            } catch (error) {
                console.error('Create account error:', error);
                error4.textContent = 'Server error. Please try again.';
            } finally {
                createBtn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
                createBtn.disabled = false;
            }
        }
        
        createBtn.addEventListener('click', createAccount);
        
        saveQRBtn.addEventListener('click', () => {
            const canvas = qrcodeDiv.querySelector('canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = `BYPRO-${displayIdSpan.textContent}.png`;
                link.href = canvas.toDataURL();
                link.click();
            }
        });
        
        loginBtn.addEventListener('click', () => {
            window.location.href = 'login.html';
        });
        
        // Enter key support
        usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') nextStep(1); });
        emailInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') nextStep(2); });
        passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') nextStep(3); });
        
        showStep(1);
        
        // Clear on load
        setTimeout(() => {
            usernameInput.value = '';
            emailInput.value = '';
            passwordInput.value = '';
        }, 100);
    </script>
</body>
</html>

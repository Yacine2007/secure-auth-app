<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>B.Y PRO - Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #000000; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 12px; }
        .container { width: 100%; max-width: 400px; }
        .card { background: #ffffff; border-radius: 28px; padding: 30px 24px; box-shadow: 0 15px 30px rgba(255, 255, 255, 0.03); border: 1px solid #e0e0e0; }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .logo-img { width: 32px; height: 32px; object-fit: contain; }
        .brand { display: flex; align-items: center; flex-wrap: wrap; }
        .brand-black { font-size: 24px; font-weight: 600; color: #000000; letter-spacing: -0.3px; }
        .brand-account { font-size: 24px; font-weight: 600; color: #2a6df4; letter-spacing: -0.3px; margin-left: 4px; }
        .subtitle { color: #4a4a4a; font-size: 14px; margin-bottom: 24px; margin-left: 42px; }
        
        .step-indicator { display: flex; gap: 6px; margin-bottom: 24px; }
        .step-dot { height: 6px; flex: 1; background: #e0e0e0; border-radius: 20px; }
        .step-dot.active { background: #2a6df4; }
        .step-dot.completed { background: #000000; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; color: #333333; margin-bottom: 6px; }
        label i { color: #2a6df4; margin-right: 5px; }
        input { width: 100%; padding: 14px 18px; border: 1.5px solid #cccccc; border-radius: 30px; font-size: 15px; background: white; }
        input:focus { outline: none; border-color: #2a6df4; }
        
        .btn-primary { width: 100%; padding: 14px; background: #000000; color: white; border: none; border-radius: 40px; font-size: 15px; font-weight: 600; cursor: pointer; margin: 8px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary:hover { background: #2a6df4; }
        
        .avatar-upload { border: 2px dashed #cccccc; border-radius: 30px; padding: 15px; text-align: center; cursor: pointer; margin: 15px 0; transition: all 0.2s; }
        .avatar-upload:hover { border-color: #2a6df4; background: #f5f5f5; }
        .avatar-upload i { font-size: 32px; color: #2a6df4; margin-bottom: 8px; }
        .avatar-upload p { font-size: 12px; color: #666; }
        .avatar-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 10px auto; display: none; border: 2px solid #2a6df4; }
        
        .result-box { background: #f8fafd; border-radius: 20px; padding: 16px 12px; margin: 10px 0 5px; border: 1.5px dashed #2a6df4; animation: fadeIn 0.3s ease; max-width: 100%; text-align: center; }
        .result-box i { font-size: 28px; color: #2a6df4; margin-bottom: 5px; }
        .result-box h3 { font-size: 16px; font-weight: 500; color: #000; margin-bottom: 10px; }
        .user-id-label { font-size: 11px; font-weight: 400; color: #666; text-transform: uppercase; }
        .user-id { font-size: 20px; font-weight: 500; color: #000000; background: white; padding: 6px 16px; border-radius: 40px; border: 1.5px solid #2a6df4; display: inline-block; margin: 5px 0; letter-spacing: 0.5px; word-break: break-all; }
        .qr-container { display: flex; justify-content: center; margin: 8px 0 5px; padding: 8px; background: white; border-radius: 12px; }
        .qr-container canvas { max-width: 130px; height: auto; }
        .result-actions { display: flex; gap: 6px; margin: 8px 0 3px; justify-content: center; flex-wrap: wrap; }
        .result-actions .btn-primary { min-width: 100px; padding: 8px 12px; margin: 0; font-size: 12px; font-weight: 500; border-radius: 30px; background: white; color: #000000; border: 1.5px solid #000000; }
        .result-actions .btn-success { color: #2a6df4; border-color: #2a6df4; }
        .result-actions .btn-success:hover { background: #2a6df4; color: white; }
        
        .password-wrapper { position: relative; }
        .eye-icon { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #777; font-size: 16px; }
        .error { color: #e53e3e; font-size: 12px; margin-top: 4px; }
        .link { color: #2a6df4; text-decoration: none; font-weight: 500; font-size: 13px; margin-top: 16px; display: inline-block; }
        .loading-spinner { width: 20px; height: 20px; border: 2px solid white; border-top-color: #2a6df4; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        [translate="no"] { -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body translate="no">
    <div class="container">
        <div class="card">
            <div class="header">
                <img src="https://by-pro.kesug.com/B.Y%20PRO.png" class="logo-img" onerror="this.style.display='none'">
                <div class="brand">
                    <span class="brand-black">B.Y PRO</span>
                    <span class="brand-account">Account</span>
                </div>
            </div>
            <div class="subtitle">Create your account</div>

            <div class="step-indicator">
                <div class="step-dot active" id="step1Dot"></div>
                <div class="step-dot" id="step2Dot"></div>
            </div>

            <!-- Step 1: User Details -->
            <div id="step1">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="e.g. john_doe" autocomplete="off">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="off">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-key"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Create a strong password" autocomplete="new-password">
                        <i class="fas fa-eye-slash eye-icon" id="togglePassword"></i>
                    </div>
                </div>
                
                <div class="avatar-upload" id="avatarUpload">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Click to upload profile picture (optional)</p>
                    <input type="file" id="avatarInput" accept="image/*" style="display:none">
                </div>
                <img id="avatarPreview" class="avatar-preview">
                
                <button class="btn-primary" id="createAccountBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
                <div id="step1Error" class="error"></div>
            </div>

            <!-- Step 2: Success -->
            <div id="step2" style="display: none;">
                <div class="result-box">
                    <i class="fas fa-check-circle"></i>
                    <h3>Account Created!</h3>
                    <div class="user-id-label">YOUR ID</div>
                    <div class="user-id" id="displayId"></div>
                    <div class="qr-note"><i class="fas fa-qrcode"></i> Scan to login</div>
                    <div id="qrcode" class="qr-container"></div>
                    <p>Save this QR code for quick login</p>
                    <div class="result-actions">
                        <button class="btn-primary" id="saveQRBtn"><i class="fas fa-download"></i> Save QR</button>
                        <button class="btn-primary btn-success" id="confirmLoginBtn"><i class="fas fa-sign-in-alt"></i> Go to Login</button>
                    </div>
                </div>
            </div>

            <p id="loginLink" style="text-align: center; margin-top: 16px;">
                <a href="login.html" class="link">Already have an account?</a>
            </p>
        </div>
    </div>

    <script>
        const API_BASE = 'https://b-y-pro-acounts-login.onrender.com';
        const INTERNAL_KEY = 'bypro-internal-key-2025';
        
        let avatarFile = null;
        
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step1Dot = document.getElementById('step1Dot');
        const step2Dot = document.getElementById('step2Dot');
        const loginLink = document.getElementById('loginLink');
        
        const username = document.getElementById('username');
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const avatarUpload = document.getElementById('avatarUpload');
        const avatarInput = document.getElementById('avatarInput');
        const avatarPreview = document.getElementById('avatarPreview');
        const createAccountBtn = document.getElementById('createAccountBtn');
        const step1Error = document.getElementById('step1Error');
        const displayId = document.getElementById('displayId');
        const qrcode = document.getElementById('qrcode');
        const saveQRBtn = document.getElementById('saveQRBtn');
        const confirmLoginBtn = document.getElementById('confirmLoginBtn');
        
        togglePassword.addEventListener('click', function() {
            const type = password.type === 'password' ? 'text' : 'password';
            password.type = type;
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
        
        avatarUpload.addEventListener('click', () => avatarInput.click());
        
        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.match('image.*')) {
                step1Error.textContent = 'Please select a valid image file';
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                step1Error.textContent = 'Image size should be less than 5MB';
                return;
            }
            avatarFile = file;
            const reader = new FileReader();
            reader.onload = (ev) => {
                avatarPreview.src = ev.target.result;
                avatarPreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        });
        
        async function uploadAvatar(accountId) {
            if (!avatarFile) return null;
            const formData = new FormData();
            formData.append('avatar', avatarFile);
            try {
                const response = await fetch(`${API_BASE}/api/accounts/${accountId}/avatar`, {
                    method: 'POST',
                    headers: { 'x-api-key': INTERNAL_KEY },
                    body: formData
                });
                const data = await response.json();
                if (data.success) return data.avatarUrl;
                return null;
            } catch (error) {
                console.error('Avatar upload error:', error);
                return null;
            }
        }
        
        function showStep(step) {
            step1.style.display = step === 1 ? 'block' : 'none';
            step2.style.display = step === 2 ? 'block' : 'none';
            loginLink.style.display = step === 1 ? 'block' : 'none';
            step1Dot.className = 'step-dot' + (step >= 1 ? ' completed' : '') + (step === 1 ? ' active' : '');
            step2Dot.className = 'step-dot' + (step >= 2 ? ' completed' : '') + (step === 2 ? ' active' : '');
        }
        
        createAccountBtn.addEventListener('click', async () => {
            const name = username.value.trim();
            const emailValue = email.value.trim();
            const pass = password.value.trim();
            
            if (!name || !emailValue || !pass) {
                step1Error.textContent = 'All fields are required';
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailValue)) {
                step1Error.textContent = 'Invalid email format';
                return;
            }
            if (pass.length < 6) {
                step1Error.textContent = 'Password must be at least 6 characters';
                return;
            }
            
            createAccountBtn.innerHTML = '<div class="loading-spinner"></div> Creating...';
            createAccountBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/api/create-account`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email: emailValue, password: pass })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const userId = result.account.id;
                    
                    if (avatarFile) {
                        await uploadAvatar(userId);
                    }
                    
                    displayId.textContent = userId;
                    const qrData = `BYPRO:${userId}:${pass}`;
                    qrcode.innerHTML = '';
                    new QRCode(qrcode, {
                        text: qrData,
                        width: 130,
                        height: 130,
                        colorDark: "#000000",
                        colorLight: "#ffffff"
                    });
                    
                    showStep(2);
                } else {
                    step1Error.textContent = result.error || 'Failed to create account';
                }
            } catch (error) {
                console.error('Create account error:', error);
                step1Error.textContent = 'Server error. Please try again.';
            } finally {
                createAccountBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                createAccountBtn.disabled = false;
            }
        });
        
        saveQRBtn.addEventListener('click', () => {
            const canvas = qrcode.querySelector('canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = `BYPRO-${displayId.textContent}.png`;
                link.href = canvas.toDataURL();
                link.click();
            }
        });
        
        confirmLoginBtn.addEventListener('click', () => {
            window.location.href = 'login.html';
        });
        
        showStep(1);
        
        setTimeout(() => {
            username.value = '';
            email.value = '';
            password.value = '';
        }, 100);
        
        const style = document.createElement('style');
        style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>

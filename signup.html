<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.Y PRO - Sign Up</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- QR Code library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* نفس التصميم الذي أرسلته */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 30px 24px;
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.03);
            border: 1px solid #e0e0e0;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .logo-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        .brand {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .brand-black {
            font-size: 24px;
            font-weight: 600;
            color: #000000;
            letter-spacing: -0.3px;
        }
        .brand-account {
            font-size: 24px;
            font-weight: 600;
            color: #2a6df4;
            letter-spacing: -0.3px;
            margin-left: 4px;
        }
        .subtitle {
            color: #4a4a4a;
            font-size: 14px;
            margin-bottom: 24px;
            margin-left: 42px;
        }
        
        /* مؤشر الخطوات */
        .step-indicator {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
        }
        .step-dot {
            height: 6px;
            flex: 1;
            background: #e0e0e0;
            border-radius: 20px;
        }
        .step-dot.active {
            background: #2a6df4;
        }
        .step-dot.completed {
            background: #000000;
        }
        
        /* الحقول - مع منع الملء التلقائي */
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333333;
            margin-bottom: 6px;
        }
        label i {
            color: #2a6df4;
            margin-right: 5px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #cccccc;
            border-radius: 30px;
            font-size: 15px;
            background: white;
        }
        input:focus {
            outline: none;
            border-color: #2a6df4;
        }
        
        /* الأزرار العادية */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #000000;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: #2a6df4;
        }
        
        /* رسالة Elastic Email */
        .elastic-warning {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 12px;
            border-radius: 20px;
            margin: 15px 0;
            font-size: 13px;
            text-align: center;
        }
        .elastic-warning i {
            color: #f0ad4e;
            margin-right: 5px;
        }
        
        /* ===== المرحلة الأخيرة - تصميم أصغر ومتكيف ===== */
        .result-box {
            background: #f8fafd;
            border-radius: 20px;
            padding: 16px 12px;
            margin: 10px 0 5px;
            border: 1.5px dashed #2a6df4;
            animation: fadeIn 0.3s ease;
            max-width: 100%;
        }
        
        .result-box i {
            font-size: 28px;
            color: #2a6df4;
            margin-bottom: 5px;
        }
        
        .result-box h3 {
            font-size: 16px;
            font-weight: 500;
            color: #000;
            margin-bottom: 10px;
        }
        
        .user-id-label {
            font-size: 11px;
            font-weight: 400;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .user-id {
            font-size: 20px;
            font-weight: 500;
            color: #000000;
            background: white;
            padding: 6px 16px;
            border-radius: 40px;
            border: 1.5px solid #2a6df4;
            display: inline-block;
            margin: 5px 0;
            letter-spacing: 0.5px;
            word-break: break-all;
            max-width: 100%;
        }
        
        .qr-note {
            font-size: 11px;
            font-weight: 400;
            color: #666;
            margin: 5px 0 3px;
        }
        
        .qr-container {
            display: flex;
            justify-content: center;
            margin: 8px 0 5px;
            padding: 8px;
            background: white;
            border-radius: 12px;
            max-width: 100%;
        }
        
        .qr-container canvas {
            max-width: 130px;
            height: auto;
        }
        
        .result-box p {
            font-size: 10px;
            font-weight: 300;
            color: #888;
            margin: 5px 0 8px;
        }
        
        .result-actions {
            display: flex;
            gap: 6px;
            margin: 8px 0 3px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .result-actions .btn-primary {
            min-width: 100px;
            padding: 8px 12px;
            margin: 0;
            font-size: 12px;
            font-weight: 500;
            border-radius: 30px;
            background: white;
            color: #000000;
            border: 1.5px solid #000000;
        }
        
        .result-actions .btn-primary i {
            font-size: 12px;
            margin-right: 4px;
        }
        
        .result-actions .btn-success {
            color: #2a6df4;
            border-color: #2a6df4;
        }
        
        .result-actions .btn-success:hover {
            background: #2a6df4;
            color: white;
        }
        
        /* باقي العناصر */
        .password-wrapper {
            position: relative;
        }
        .eye-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #777;
            font-size: 16px;
        }
        .error {
            color: #e53e3e;
            font-size: 12px;
            margin-top: 4px;
        }
        .timer {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            text-align: center;
        }
        .resend-link {
            color: #2a6df4;
            cursor: pointer;
            font-weight: 500;
        }
        .resend-link.disabled {
            color: #999;
            pointer-events: none;
        }
        .link {
            color: #2a6df4;
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            margin-top: 16px;
            display: inline-block;
        }
        .welcome-message {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a6df4;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 2000;
            min-width: 250px;
            text-align: center;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <img src="https://by-pro.kesug.com/B.Y%20PRO.png" alt="B.Y PRO Logo" class="logo-img" onerror="this.style.display='none'">
                <div class="brand">
                    <span class="brand-black">B.Y PRO</span>
                    <span class="brand-account">Account</span>
                </div>
            </div>
            <div class="subtitle">Create your account</div>

            <!-- مؤشر الخطوات -->
            <div class="step-indicator">
                <div class="step-dot active" id="step1Dot"></div>
                <div class="step-dot" id="step2Dot"></div>
                <div class="step-dot" id="step3Dot"></div>
            </div>

            <!-- رسالة Elastic Email -->
            <div class="elastic-warning" id="elasticWarning">
                <i class="fas fa-info-circle"></i>
                For testing: Codes are sent to byprosprt2007@gmail.com only
            </div>

            <!-- الخطوات - مع منع الملء التلقائي -->
            <div id="step1">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" name="username" placeholder="e.g. john_doe" autocomplete="off">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="off">
                </div>
                <button class="btn-primary" id="sendCodeBtn">Send code</button>
                <div id="step1Error" class="error"></div>
            </div>

            <div id="step2" style="display: none;">
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Verification code</label>
                    <input type="text" id="verificationCode" name="verificationCode" placeholder="6-digit code" maxlength="6" autocomplete="off">
                </div>
                <button class="btn-primary" id="verifyCodeBtn">Verify</button>
                <div id="step2Error" class="error"></div>
                <div class="timer" id="timer">Code sent! <span id="resendLink" class="resend-link">Resend</span></div>
            </div>

            <div id="step3" style="display: none;">
                <div class="input-group">
                    <label><i class="fas fa-key"></i> Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Create a strong password" autocomplete="new-password">
                        <i class="fas fa-eye-slash eye-icon" id="togglePassword"></i>
                    </div>
                </div>
                <button class="btn-primary" id="signupBtn">Create account</button>
                <div id="step3Error" class="error"></div>
            </div>

            <!-- المرحلة الأخيرة -->
            <div id="resultArea" style="display: none;">
                <div class="result-box">
                    <i class="fas fa-check-circle"></i>
                    <h3>Account Created</h3>
                    
                    <div class="user-id-label">YOUR ID</div>
                    <div class="user-id" id="displayId"></div>
                    
                    <div class="qr-note"><i class="fas fa-qrcode"></i> Scan to login</div>
                    <div id="qrcode" class="qr-container"></div>
                    
                    <p>Save QR for quick login</p>
                    
                    <div class="result-actions">
                        <button class="btn-primary" id="saveQRBtn"><i class="fas fa-download"></i> Save</button>
                        <button class="btn-primary btn-success" id="confirmLoginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
                    </div>
                </div>
            </div>

            <p id="loginLink" style="text-align: center; margin-top: 16px;">
                <a href="login.html" class="link">Already have an account?</a>
            </p>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const CONFIG = {
            API_BASE: 'https://b-y-pro-acounts-login.onrender.com'
        };

        // ==================== DOM Elements ====================
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        const resultArea = document.getElementById('resultArea');
        const loginLink = document.getElementById('loginLink');
        const step1Dot = document.getElementById('step1Dot');
        const step2Dot = document.getElementById('step2Dot');
        const step3Dot = document.getElementById('step3Dot');
        
        const username = document.getElementById('username');
        const email = document.getElementById('email');
        const verificationCode = document.getElementById('verificationCode');
        const password = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        const verifyCodeBtn = document.getElementById('verifyCodeBtn');
        const signupBtn = document.getElementById('signupBtn');
        const saveQRBtn = document.getElementById('saveQRBtn');
        const confirmLoginBtn = document.getElementById('confirmLoginBtn');
        const resendLink = document.getElementById('resendLink');
        
        const step1Error = document.getElementById('step1Error');
        const step2Error = document.getElementById('step2Error');
        const step3Error = document.getElementById('step3Error');
        const timer = document.getElementById('timer');
        
        const displayId = document.getElementById('displayId');
        const qrcode = document.getElementById('qrcode');
        const elasticWarning = document.getElementById('elasticWarning');

        // ==================== State ====================
        let currentStep = 1;
        let userData = {};
        let generatedCode = '';
        let timerInterval;
        let timeLeft = 60;
        let canResend = true;

        // ==================== Toggle Password ====================
        togglePassword.addEventListener('click', function() {
            const type = password.type === 'password' ? 'text' : 'password';
            password.type = type;
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // ==================== Step Navigation ====================
        function showStep(step) {
            step1.style.display = step === 1 ? 'block' : 'none';
            step2.style.display = step === 2 ? 'block' : 'none';
            step3.style.display = step === 3 ? 'block' : 'none';
            resultArea.style.display = 'none';
            loginLink.style.display = 'block';
            
            step1Dot.className = 'step-dot' + (step >= 1 ? ' completed' : '') + (step === 1 ? ' active' : '');
            step2Dot.className = 'step-dot' + (step >= 2 ? ' completed' : '') + (step === 2 ? ' active' : '');
            step3Dot.className = 'step-dot' + (step >= 3 ? ' completed' : '') + (step === 3 ? ' active' : '');
        }

        function showResult() {
            step1.style.display = 'none';
            step2.style.display = 'none';
            step3.style.display = 'none';
            resultArea.style.display = 'block';
            loginLink.style.display = 'none';
            
            step1Dot.className = 'step-dot completed';
            step2Dot.className = 'step-dot completed';
            step3Dot.className = 'step-dot completed';
        }

        // ==================== Timer ====================
        function startTimer() {
            timeLeft = 60;
            canResend = false;
            resendLink.classList.add('disabled');
            
            timer.innerHTML = `Resend in ${timeLeft}s <span id="resendLink" class="resend-link disabled">Resend</span>`;
            
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    canResend = true;
                    timer.innerHTML = `<span id="resendLink" class="resend-link">Resend</span>`;
                } else {
                    timer.innerHTML = `Resend in ${timeLeft}s <span id="resendLink" class="resend-link disabled">Resend</span>`;
                }
            }, 1000);
        }

        // ==================== Send Code ====================
        sendCodeBtn.addEventListener('click', async () => {
            const name = username.value.trim();
            const emailValue = email.value.trim();
            
            if (!name || !emailValue) {
                step1Error.textContent = 'All fields required';
                return;
            }
            
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailValue)) {
                step1Error.textContent = 'Invalid email format';
                return;
            }

            sendCodeBtn.innerHTML = '<div class="loading-spinner" style="width:20px;height:20px;border:2px solid white;border-top:2px solid #2a6df4;border-radius:50%;animation:spin 1s linear infinite;"></div>';
            sendCodeBtn.disabled = true;

            try {
                const response = await fetch(`${CONFIG.API_BASE}/api/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailValue })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    userData = { username: name, email: emailValue };
                    
                    // Check if using test email
                    if (emailValue === 'byprosprt2007@gmail.com') {
                        elasticWarning.style.display = 'block';
                    } else {
                        elasticWarning.innerHTML = '<i class="fas fa-info-circle"></i> Code sent! Check your email';
                        elasticWarning.style.background = '#d4edda';
                        elasticWarning.style.color = '#155724';
                        elasticWarning.style.borderColor = '#c3e6cb';
                    }
                    
                    showStep(2);
                    startTimer();
                    step1Error.textContent = '';
                } else {
                    step1Error.textContent = result.error || 'Failed to send code';
                }
            } catch (error) {
                console.error('Send OTP error:', error);
                step1Error.textContent = 'Connection error - check console';
            } finally {
                sendCodeBtn.innerHTML = 'Send code';
                sendCodeBtn.disabled = false;
            }
        });

        // ==================== Resend Code ====================
        resendLink.addEventListener('click', async () => {
            if (!canResend || !userData.email) return;
            
            try {
                const response = await fetch(`${CONFIG.API_BASE}/api/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userData.email })
                });

                if (response.ok) {
                    startTimer();
                    step2Error.textContent = '';
                }
            } catch (error) {
                step2Error.textContent = 'Failed to resend';
            }
        });

        // ==================== Verify Code ====================
        verifyCodeBtn.addEventListener('click', async () => {
            const code = verificationCode.value.trim();
            
            if (!code || code.length !== 6) {
                step2Error.textContent = 'Enter 6-digit code';
                return;
            }

            verifyCodeBtn.innerHTML = '<div class="loading-spinner" style="width:20px;height:20px;border:2px solid white;border-top:2px solid #2a6df4;border-radius:50%;animation:spin 1s linear infinite;"></div>';
            verifyCodeBtn.disabled = true;

            try {
                const response = await fetch(`${CONFIG.API_BASE}/api/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userData.email, otp: code })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    clearInterval(timerInterval);
                    showStep(3);
                    step2Error.textContent = '';
                } else {
                    step2Error.textContent = result.error || 'Invalid code';
                }
            } catch (error) {
                console.error('Verify OTP error:', error);
                step2Error.textContent = 'Verification failed';
            } finally {
                verifyCodeBtn.innerHTML = 'Verify';
                verifyCodeBtn.disabled = false;
            }
        });

        // ==================== Create Account ====================
        signupBtn.addEventListener('click', async () => {
            const pass = password.value.trim();
            
            if (pass.length < 6) {
                step3Error.textContent = 'Password too short';
                return;
            }

            signupBtn.innerHTML = '<div class="loading-spinner" style="width:20px;height:20px;border:2px solid white;border-top:2px solid #2a6df4;border-radius:50%;animation:spin 1s linear infinite;"></div>';
            signupBtn.disabled = true;

            try {
                // Get next ID
                const idResponse = await fetch(`${CONFIG.API_BASE}/api/next-id`, {
                    headers: { 'x-api-key': 'bypro_internal_key_2025_secure' }
                });
                
                if (!idResponse.ok) {
                    throw new Error('Failed to get ID');
                }
                
                const idResult = await idResponse.json();
                const userId = idResult.success ? idResult.nextId : Math.floor(10000000 + Math.random() * 90000000).toString();

                // Create account
                const response = await fetch(`${CONFIG.API_BASE}/api/create-account`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: userId,
                        name: userData.username,
                        email: userData.email,
                        password: pass,
                        otpCode: verificationCode.value.trim()
                    })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    displayId.textContent = userId;
                    
                    // Generate QR
                    const qrData = `BYPRO:${userId}:${pass}`;
                    qrcode.innerHTML = '';
                    new QRCode(qrcode, {
                        text: qrData,
                        width: 130,
                        height: 130,
                        colorDark: "#000000",
                        colorLight: "#ffffff"
                    });
                    
                    showResult();
                    step3Error.textContent = '';
                } else {
                    step3Error.textContent = result.error || 'Failed to create account';
                }
            } catch (error) {
                console.error('Create account error:', error);
                step3Error.textContent = 'Server error - check console';
            } finally {
                signupBtn.innerHTML = 'Create account';
                signupBtn.disabled = false;
            }
        });

        // ==================== Save QR ====================
        saveQRBtn.addEventListener('click', () => {
            const canvas = qrcode.querySelector('canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = `BYPRO-${displayId.textContent}.png`;
                link.href = canvas.toDataURL();
                link.click();
            }
        });

        // ==================== Go to Login ====================
        confirmLoginBtn.addEventListener('click', () => {
            window.location.href = 'login.html';
        });

        // ==================== Initialize ====================
        showStep(1);
        
        // منع الملء التلقائي للمتصفح
        setTimeout(() => {
            username.value = '';
            email.value = '';
            verificationCode.value = '';
            password.value = '';
        }, 100);
    </script>
</body>
</html>

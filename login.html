<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.Y PRO - Login</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- jsQR -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 30px 24px;
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.03);
            border: 1px solid #e0e0e0;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .logo-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        .brand {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .brand-black {
            font-size: 24px;
            font-weight: 600;
            color: #000000;
            letter-spacing: -0.3px;
        }
        .brand-account {
            font-size: 24px;
            font-weight: 600;
            color: #2a6df4;
            letter-spacing: -0.3px;
            margin-left: 4px;
        }
        .subtitle {
            color: #4a4a4a;
            font-size: 14px;
            margin-bottom: 24px;
            margin-left: 42px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333333;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #cccccc;
            border-radius: 30px;
            font-size: 15px;
            transition: 0.2s;
            background: white;
        }
        input:focus {
            outline: none;
            border-color: #2a6df4;
            box-shadow: 0 0 0 3px rgba(42, 109, 244, 0.1);
        }
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        .eye-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #777777;
            font-size: 16px;
        }
        .qr-trigger {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 16px 0 8px;
            color: #555;
            cursor: pointer;
            padding: 8px;
            border-radius: 30px;
            font-size: 14px;
        }
        .qr-trigger:hover {
            color: #2a6df4;
            background: #f5f5f5;
        }
        .qr-trigger i {
            font-size: 20px;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #000000;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-primary:hover {
            background: #2a6df4;
        }
        .link {
            color: #2a6df4;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            display: inline-block;
            margin-top: 16px;
        }
        .error-message {
            color: #e53e3e;
            font-size: 13px;
            margin-top: 5px;
            padding-left: 14px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            padding: 12px;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
        }
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }
        .qr-option-btn {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: 1.5px solid #e0e0e0;
            border-radius: 30px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
        }
        .qr-option-btn:hover {
            border-color: #2a6df4;
            background: #f5f5f5;
        }
        .qr-option-btn i {
            font-size: 24px;
            color: #2a6df4;
        }
        .camera-container {
            width: 100%;
            margin: 15px 0;
            border-radius: 20px;
            overflow: hidden;
            background: #f0f0f0;
        }
        #cameraView {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
        }
        .camera-btn {
            padding: 12px;
            border: none;
            border-radius: 30px;
            background: #000000;
            color: white;
            cursor: pointer;
            font-weight: 500;
            margin: 5px 0;
        }
        .upload-area {
            margin: 15px 0;
            padding: 20px;
            border: 2px dashed #cccccc;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
        }
        .upload-area i {
            font-size: 30px;
            color: #2a6df4;
        }
        .back-btn {
            color: #2a6df4;
            cursor: pointer;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .qr-result {
            margin-top: 12px;
            padding: 10px;
            border-radius: 16px;
            background: #f0f7ff;
            font-size: 13px;
            word-break: break-all;
        }
        .welcome-message {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a6df4;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 14px;
            z-index: 2000;
            min-width: 250px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <img src="https://by-pro.kesug.com/B.Y%20PRO.png" alt="B.Y PRO Logo" class="logo-img" onerror="this.style.display='none'">
                <div class="brand">
                    <span class="brand-black">B.Y PRO</span>
                    <span class="brand-account">Account</span>
                </div>
            </div>
            <div class="subtitle">Login to your account</div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>ID</label>
                    <input type="text" id="loginId" placeholder="Enter your ID" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Enter password" required>
                        <i class="fas fa-eye-slash eye-icon" id="togglePassword"></i>
                    </div>
                </div>
                <div id="loginError" class="error-message"></div>

                <div class="qr-trigger" id="showQrOptions">
                    <i class="fas fa-qrcode"></i>
                    <span>Login with QR code</span>
                </div>

                <button type="submit" class="btn-primary">Log in</button>
            </form>

            <p style="text-align: center;">
                <a href="signup.html" class="link">Create new account →</a>
            </p>
        </div>
    </div>

    <!-- QR Options Modal -->
    <div id="qrChoiceModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeChoiceModal">&times;</span>
            <h3 style="margin-bottom: 20px; font-size: 18px;">Choose QR method</h3>
            
            <button class="qr-option-btn" id="chooseCamera">
                <i class="fas fa-camera"></i>
                <div style="text-align: left;">
                    <div style="font-weight: 600;">Live Scan</div>
                    <div style="font-size: 12px; color: #666;">Use camera</div>
                </div>
            </button>
            
            <button class="qr-option-btn" id="chooseUpload">
                <i class="fas fa-cloud-upload-alt"></i>
                <div style="text-align: left;">
                    <div style="font-weight: 600;">Upload Image</div>
                    <div style="font-size: 12px; color: #666;">Upload photo</div>
                </div>
            </button>
        </div>
    </div>

    <!-- QR Modal -->
    <div id="qrModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <span class="back-btn" id="backToChoice"><i class="fas fa-arrow-left"></i> Back</span>
            <h3 style="margin: 10px 0 15px; font-size: 18px;" id="modalTitle">Scan QR Code</h3>
            
            <div id="cameraContainer" style="display: none;">
                <div class="camera-container">
                    <video id="cameraView" autoplay playsinline></video>
                </div>
                <canvas id="cameraCanvas" style="display: none;"></canvas>
                <button class="camera-btn" id="captureBtn" style="width: 100%;">Capture</button>
            </div>
            
            <div id="uploadContainer" style="display: none;">
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p style="margin: 5px 0;">Click to upload</p>
                    <input type="file" id="qrFileInput" class="file-input" accept="image/*" style="display: none;">
                </div>
            </div>
            
            <canvas id="qrCanvas" style="display: none;"></canvas>
            <div id="qrModalResult" class="qr-result"></div>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const CONFIG = {
            API_BASE: 'https://b-y-pro-acounts-login.onrender.com'
        };

        // ==================== DOM Elements ====================
        const loginForm = document.getElementById('loginForm');
        const loginId = document.getElementById('loginId');
        const loginPassword = document.getElementById('loginPassword');
        const loginError = document.getElementById('loginError');
        const togglePassword = document.getElementById('togglePassword');

        // ==================== Toggle Password ====================
        togglePassword.addEventListener('click', function() {
            const type = loginPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            loginPassword.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // ==================== Login Form ====================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = loginId.value.trim();
            const pwd = loginPassword.value.trim();
            
            if (!id || !pwd) {
                loginError.textContent = 'Please enter both ID and password.';
                return;
            }

            try {
                const response = await fetch(`${CONFIG.API_BASE}/api/verify-account`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, password: pwd })
                });

                const result = await response.json();

                if (result.success) {
                    loginError.style.color = '#2a6df4';
                    loginError.textContent = '';
                    showWelcomeMessage(result.account.name || 'User');
                } else {
                    loginError.style.color = '#e53e3e';
                    loginError.textContent = '❌ ' + (result.error || 'Invalid credentials');
                }
            } catch (error) {
                loginError.style.color = '#e53e3e';
                loginError.textContent = '❌ Connection error';
            }
        });

        function showWelcomeMessage(username) {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'welcome-message';
            welcomeDiv.innerHTML = `<i class="fas fa-smile-wink"></i> Welcome back, ${username}!`;
            document.body.appendChild(welcomeDiv);
            setTimeout(() => window.location.href = 'signup.html', 2000);
        }

        // ==================== QR Code Logic ====================
        const qrChoiceModal = document.getElementById('qrChoiceModal');
        const qrModal = document.getElementById('qrModal');
        const showQrOptions = document.getElementById('showQrOptions');
        const closeChoiceModal = document.getElementById('closeChoiceModal');
        const closeModal = document.getElementById('closeModal');
        const backToChoice = document.getElementById('backToChoice');
        const chooseCamera = document.getElementById('chooseCamera');
        const chooseUpload = document.getElementById('chooseUpload');
        const modalTitle = document.getElementById('modalTitle');
        const cameraContainer = document.getElementById('cameraContainer');
        const uploadContainer = document.getElementById('uploadContainer');
        const cameraView = document.getElementById('cameraView');
        const cameraCanvas = document.getElementById('cameraCanvas');
        const captureBtn = document.getElementById('captureBtn');
        const uploadArea = document.getElementById('uploadArea');
        const qrFileInput = document.getElementById('qrFileInput');
        const qrCanvas = document.getElementById('qrCanvas');
        const qrModalResult = document.getElementById('qrModalResult');

        let cameraStream = null;

        showQrOptions.addEventListener('click', () => qrChoiceModal.style.display = 'flex');

        closeChoiceModal.addEventListener('click', () => qrChoiceModal.style.display = 'none');
        closeModal.addEventListener('click', () => {
            qrModal.style.display = 'none';
            if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
        });

        backToChoice.addEventListener('click', () => {
            qrModal.style.display = 'none';
            qrChoiceModal.style.display = 'flex';
            if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
        });

        chooseCamera.addEventListener('click', () => {
            qrChoiceModal.style.display = 'none';
            qrModal.style.display = 'flex';
            cameraContainer.style.display = 'block';
            uploadContainer.style.display = 'none';
            modalTitle.textContent = 'Scan with Camera';
            startCamera();
        });

        chooseUpload.addEventListener('click', () => {
            qrChoiceModal.style.display = 'none';
            qrModal.style.display = 'flex';
            cameraContainer.style.display = 'none';
            uploadContainer.style.display = 'block';
            modalTitle.textContent = 'Upload QR Code';
            if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
        });

        async function startCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                cameraView.srcObject = cameraStream;
            } catch (err) {
                qrModalResult.innerHTML = '<span style="color:#e53e3e;">Camera access denied</span>';
            }
        }

        captureBtn.addEventListener('click', () => {
            if (!cameraStream) return;
            cameraCanvas.width = cameraView.videoWidth;
            cameraCanvas.height = cameraView.videoHeight;
            const ctx = cameraCanvas.getContext('2d');
            ctx.drawImage(cameraView, 0, 0, cameraCanvas.width, cameraCanvas.height);
            const imageData = ctx.getImageData(0, 0, cameraCanvas.width, cameraCanvas.height);
            const code = jsQR(imageData.data, cameraCanvas.width, cameraCanvas.height);
            if (code) processQRLogin(code.data);
            else qrModalResult.innerHTML = '<span style="color:#e53e3e;">No QR code found</span>';
        });

        uploadArea.addEventListener('click', () => qrFileInput.click());

        qrFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    qrCanvas.width = img.width;
                    qrCanvas.height = img.height;
                    const ctx = qrCanvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, img.width, img.height);
                    const imageData = ctx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
                    const code = jsQR(imageData.data, qrCanvas.width, qrCanvas.height);
                    if (code) processQRLogin(code.data);
                    else qrModalResult.innerHTML = '<span style="color:#e53e3e;">No QR code found</span>';
                };
            };
            reader.readAsDataURL(file);
        });

        async function processQRLogin(qrData) {
            // QR format: BYPRO:ID:PASSWORD
            if (qrData.startsWith('BYPRO:')) {
                const parts = qrData.split(':');
                if (parts.length === 3) {
                    const id = parts[1];
                    const password = parts[2];
                    
                    try {
                        const response = await fetch(`${CONFIG.API_BASE}/api/verify-account`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ id, password })
                        });
                        
                        const result = await response.json();
                        
                        if (result.success) {
                            qrModalResult.innerHTML = '<span style="color:#2a6df4;">✅ Login successful!</span>';
                            qrModal.style.display = 'none';
                            if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
                            showWelcomeMessage(result.account.name || 'User');
                        } else {
                            qrModalResult.innerHTML = '<span style="color:#e53e3e;">❌ Invalid QR</span>';
                        }
                    } catch (error) {
                        qrModalResult.innerHTML = '<span style="color:#e53e3e;">❌ Connection error</span>';
                    }
                }
            } else {
                qrModalResult.innerHTML = '<span style="color:#e53e3e;">❌ Invalid QR format</span>';
            }
        }
    </script>
</body>
</html>

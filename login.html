<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>B.Y PRO - Login</title>
    <link rel="icon" type="image/png" href="https://by-pro.kesug.com/B.Y%20PRO.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 30px 24px;
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.03);
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .logo-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        .brand {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .brand-black {
            font-size: 24px;
            font-weight: 600;
            color: #000000;
            letter-spacing: -0.3px;
        }
        .brand-account {
            font-size: 24px;
            font-weight: 600;
            color: #2a6df4;
            letter-spacing: -0.3px;
            margin-left: 4px;
        }
        .subtitle {
            color: #4a4a4a;
            font-size: 14px;
            margin-bottom: 24px;
            margin-left: 42px;
        }
        
        /* Logged In Section */
        .logged-in-section {
            display: none;
            text-align: center;
            padding: 20px 0;
        }
        .success-icon {
            font-size: 60px;
            color: #2a6df4;
            margin-bottom: 15px;
        }
        .welcome-title {
            font-size: 24px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 10px;
        }
        .welcome-subtitle {
            color: #4a4a4a;
            font-size: 16px;
            margin-bottom: 25px;
        }
        .user-info {
            background: #f8fafd;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #666;
            font-weight: 500;
        }
        .info-value {
            color: #2a6df4;
            font-weight: 600;
        }
        .logout-btn {
            width: 100%;
            padding: 14px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }
        .logout-btn:hover {
            background: #c82333;
        }
        
        /* Login Form */
        .login-section {
            display: block;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333333;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #cccccc;
            border-radius: 30px;
            font-size: 15px;
            transition: 0.2s;
            background: white;
        }
        input:focus {
            outline: none;
            border-color: #2a6df4;
            box-shadow: 0 0 0 3px rgba(42, 109, 244, 0.1);
        }
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        .eye-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #777777;
            font-size: 16px;
        }
        .qr-trigger {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 16px 0 8px;
            color: #555;
            cursor: pointer;
            padding: 8px;
            border-radius: 30px;
            font-size: 14px;
        }
        .qr-trigger:hover {
            color: #2a6df4;
            background: #f5f5f5;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #000000;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: #2a6df4;
        }
        .btn-primary:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        .link {
            color: #2a6df4;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            display: inline-block;
            margin-top: 16px;
        }
        .error-message {
            color: #e53e3e;
            font-size: 13px;
            margin-top: 5px;
            padding-left: 14px;
        }
        
        /* ========== تأثيرات الانتظار ========== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            flex-direction: column;
            gap: 20px;
        }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #2a6df4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            color: white;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
        }
        .loading-dots {
            display: inline-block;
        }
        .loading-dots span {
            animation: blink 1.4s infinite;
            animation-fill-mode: both;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
        
        /* رسالة تأخير */
        .delay-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #ffaa44;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            display: none;
            z-index: 10001;
            white-space: nowrap;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            padding: 12px;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
        }
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }
        .qr-option-btn {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: 1.5px solid #e0e0e0;
            border-radius: 30px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
        }
        .qr-option-btn:hover {
            border-color: #2a6df4;
            background: #f5f5f5;
        }
        .camera-container {
            width: 100%;
            margin: 15px 0;
            border-radius: 20px;
            overflow: hidden;
            background: #f0f0f0;
        }
        #cameraView {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
        }
        .camera-btn {
            padding: 12px;
            border: none;
            border-radius: 30px;
            background: #000000;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }
        .upload-area {
            margin: 15px 0;
            padding: 20px;
            border: 2px dashed #cccccc;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
        }
        .back-btn {
            color: #2a6df4;
            cursor: pointer;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .qr-result {
            margin-top: 12px;
            padding: 10px;
            border-radius: 16px;
            background: #f0f7ff;
            font-size: 13px;
            word-break: break-all;
        }
        
        /* منع الترجمة */
        [translate="no"] {
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body translate="no">
    <!-- طبقة الانتظار -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">
            Connecting to secure server
            <div class="loading-dots">
                <span>.</span><span>.</span><span>.</span>
            </div>
        </div>
    </div>
    <div id="delayMessage" class="delay-message">
        <i class="fas fa-hourglass-half"></i> Server is waking up... please wait
    </div>

    <div class="container">
        <div class="card">
            <div class="header">
                <img src="https://by-pro.kesug.com/B.Y%20PRO.png" alt="B.Y PRO Logo" class="logo-img" onerror="this.style.display='none'">
                <div class="brand">
                    <span class="brand-black">B.Y PRO</span>
                    <span class="brand-account">Account</span>
                </div>
            </div>

            <!-- Logged In Section -->
            <div id="loggedInSection" class="logged-in-section">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="welcome-title" id="welcomeName">Welcome back!</div>
                <div class="welcome-subtitle">You are successfully logged in</div>
                
                <div class="user-info">
                    <div class="info-row">
                        <span class="info-label">Account ID</span>
                        <span class="info-value" id="displayId">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Name</span>
                        <span class="info-value" id="displayName">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Email</span>
                        <span class="info-value" id="displayEmail">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Login Time</span>
                        <span class="info-value" id="loginTime">-</span>
                    </div>
                </div>
                
                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>

            <!-- Login Section -->
            <div id="loginSection" class="login-section">
                <div class="subtitle">Login to your account</div>
                
                <form id="loginForm">
                    <div class="input-group">
                        <label>ID</label>
                        <input type="text" id="loginId" placeholder="Enter your ID" required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="loginPassword" placeholder="Enter password" required autocomplete="new-password">
                            <i class="fas fa-eye-slash eye-icon" id="togglePassword"></i>
                        </div>
                    </div>
                    <div id="loginError" class="error-message"></div>

                    <div class="qr-trigger" id="showQrOptions">
                        <i class="fas fa-qrcode"></i>
                        <span>Login with QR code</span>
                    </div>

                    <button type="submit" class="btn-primary" id="loginSubmitBtn">
                        <i class="fas fa-sign-in-alt"></i> Log in
                    </button>
                </form>

                <p style="text-align: center;">
                    <a href="signup.html" class="link">Create new account →</a>
                </p>
            </div>
        </div>
    </div>

    <!-- QR Options Modal -->
    <div id="qrChoiceModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeChoiceModal">&times;</span>
            <h3 style="margin-bottom: 20px; font-size: 18px;">Choose QR method</h3>
            
            <button class="qr-option-btn" id="chooseCamera">
                <i class="fas fa-camera"></i>
                <div style="text-align: left;">
                    <div style="font-weight: 600;">Live Scan</div>
                    <div style="font-size: 12px; color: #666;">Use camera</div>
                </div>
            </button>
            
            <button class="qr-option-btn" id="chooseUpload">
                <i class="fas fa-cloud-upload-alt"></i>
                <div style="text-align: left;">
                    <div style="font-weight: 600;">Upload Image</div>
                    <div style="font-size: 12px; color: #666;">Upload photo</div>
                </div>
            </button>
        </div>
    </div>

    <!-- QR Modal -->
    <div id="qrModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <span class="back-btn" id="backToChoice"><i class="fas fa-arrow-left"></i> Back</span>
            <h3 style="margin: 10px 0 15px; font-size: 18px;" id="modalTitle">Scan QR Code</h3>
            
            <div id="cameraContainer" style="display: none;">
                <div class="camera-container">
                    <video id="cameraView" autoplay playsinline></video>
                </div>
                <canvas id="cameraCanvas" style="display: none;"></canvas>
                <button class="camera-btn" id="captureBtn" style="width: 100%;">Capture</button>
            </div>
            
            <div id="uploadContainer" style="display: none;">
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p style="margin: 5px 0;">Click to upload</p>
                    <input type="file" id="qrFileInput" class="file-input" accept="image/*" style="display: none;">
                </div>
            </div>
            
            <canvas id="qrCanvas" style="display: none;"></canvas>
            <div id="qrModalResult" class="qr-result"></div>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const CONFIG = {
            API_BASE: 'https://b-y-pro-acounts-login.onrender.com',
            SESSION_KEY: 'bypro_session',
            SESSION_DURATION: 30 * 24 * 60 * 60 * 1000
        };

        // ==================== DOM Elements ====================
        const loginSection = document.getElementById('loginSection');
        const loggedInSection = document.getElementById('loggedInSection');
        const loginForm = document.getElementById('loginForm');
        const loginId = document.getElementById('loginId');
        const loginPassword = document.getElementById('loginPassword');
        const loginError = document.getElementById('loginError');
        const togglePassword = document.getElementById('togglePassword');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginSubmitBtn = document.getElementById('loginSubmitBtn');
        const displayId = document.getElementById('displayId');
        const displayName = document.getElementById('displayName');
        const displayEmail = document.getElementById('displayEmail');
        const loginTime = document.getElementById('loginTime');
        const welcomeName = document.getElementById('welcomeName');
        
        // عناصر الانتظار
        const loadingOverlay = document.getElementById('loadingOverlay');
        const delayMessage = document.getElementById('delayMessage');
        
        let delayTimer = null;

        // ==================== Loading Functions ====================
        function showLoading(message = 'Connecting to secure server') {
            const loadingText = loadingOverlay.querySelector('.loading-text');
            loadingText.innerHTML = `${message}<div class="loading-dots"><span>.</span><span>.</span><span>.</span></div>`;
            loadingOverlay.style.display = 'flex';
            
            // عرض رسالة تأخير بعد 5 ثواني
            delayTimer = setTimeout(() => {
                delayMessage.style.display = 'block';
            }, 5000);
        }
        
        function hideLoading() {
            loadingOverlay.style.display = 'none';
            if (delayTimer) {
                clearTimeout(delayTimer);
                delayTimer = null;
            }
            delayMessage.style.display = 'none';
        }
        
        function updateLoadingMessage(message) {
            const loadingText = loadingOverlay.querySelector('.loading-text');
            loadingText.innerHTML = `${message}<div class="loading-dots"><span>.</span><span>.</span><span>.</span></div>`;
        }

        // ==================== Session Management ====================
        const Session = {
            save: (userData) => {
                const session = {
                    user: userData,
                    timestamp: Date.now(),
                    expires: Date.now() + CONFIG.SESSION_DURATION
                };
                localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify(session));
            },
            get: () => {
                try {
                    const session = JSON.parse(localStorage.getItem(CONFIG.SESSION_KEY));
                    if (!session) return null;
                    if (Date.now() > session.expires) {
                        localStorage.removeItem(CONFIG.SESSION_KEY);
                        return null;
                    }
                    return session.user;
                } catch {
                    return null;
                }
            },
            clear: () => {
                localStorage.removeItem(CONFIG.SESSION_KEY);
            }
        };

        // ==================== COMMUNICATION WITH PARENT (iframe) ====================
        function sendToParent(data) {
            if (window.parent !== window) {
                try {
                    window.parent.postMessage(data, '*');
                } catch (e) {}
            }
        }

        function notifyParentAuthState(user) {
            sendToParent({
                type: 'BYPRO_AUTH_RESPONSE',
                authenticated: !!user,
                user: user,
                timestamp: Date.now()
            });
        }

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data.type === 'BYPRO_AUTH_REQUEST') {
                const user = Session.get();
                notifyParentAuthState(user);
            } else if (data.type === 'BYPRO_LOGOUT_REQUEST') {
                performLogout();
            }
        });

        // ==================== UI Functions ====================
        function showLoggedInState(user) {
            loginSection.style.display = 'none';
            loggedInSection.style.display = 'block';
            
            welcomeName.textContent = `Welcome back, ${user.name || user.id}!`;
            displayId.textContent = user.id;
            displayName.textContent = user.name || user.id;
            displayEmail.textContent = user.email || 'Not provided';
            loginTime.textContent = new Date().toLocaleString();
            
            notifyParentAuthState(user);
        }

        function showLoginForm() {
            loginSection.style.display = 'block';
            loggedInSection.style.display = 'none';
            notifyParentAuthState(null);
        }

        function performLogout() {
            Session.clear();
            showLoginForm();
            loginId.value = '';
            loginPassword.value = '';
        }

        logoutBtn.addEventListener('click', performLogout);

        // ==================== Toggle Password ====================
        togglePassword.addEventListener('click', function() {
            const type = loginPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            loginPassword.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // ==================== Wake Up Server ====================
        async function wakeUpServer() {
            try {
                updateLoadingMessage('Waking up secure server');
                const response = await fetch(`${CONFIG.API_BASE}/api/ping`);
                if (response.ok) {
                    console.log('✅ Server is awake');
                }
                return true;
            } catch (error) {
                console.log('⚠️ Server waking up...');
                return false;
            }
        }

        // ==================== Login Form ====================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = loginId.value.trim();
            const pwd = loginPassword.value.trim();
            
            if (!id || !pwd) {
                loginError.textContent = 'Please enter both ID and password.';
                return;
            }

            // إظهار تأثير الانتظار
            showLoading('Verifying credentials');
            loginSubmitBtn.disabled = true;
            loginSubmitBtn.innerHTML = '<div class="loading-spinner" style="width:20px;height:20px;border-width:2px;"></div> Connecting...';
            
            try {
                // إيقاظ السيرفر أولاً
                await wakeUpServer();
                
                updateLoadingMessage('Authenticating');
                
                const response = await fetch(`${CONFIG.API_BASE}/api/verify-account`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, password: pwd })
                });

                const result = await response.json();

                hideLoading();
                
                if (result.success) {
                    Session.save(result.account);
                    loginError.style.color = '#2a6df4';
                    loginError.textContent = '';
                    showLoggedInState(result.account);
                } else {
                    loginError.style.color = '#e53e3e';
                    loginError.textContent = '❌ ' + (result.error || 'Invalid credentials');
                }
            } catch (error) {
                hideLoading();
                loginError.style.color = '#e53e3e';
                loginError.textContent = '❌ Connection error. Please try again.';
                console.error('Login error:', error);
            } finally {
                loginSubmitBtn.disabled = false;
                loginSubmitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Log in';
            }
        });

        // ==================== Auto Login ====================
        function attemptAutoLogin() {
            const user = Session.get();
            if (user) {
                showLoggedInState(user);
                return true;
            }
            return false;
        }

        // ==================== QR Code Logic ====================
        const qrChoiceModal = document.getElementById('qrChoiceModal');
        const qrModal = document.getElementById('qrModal');
        const showQrOptions = document.getElementById('showQrOptions');
        const closeChoiceModal = document.getElementById('closeChoiceModal');
        const closeModal = document.getElementById('closeModal');
        const backToChoice = document.getElementById('backToChoice');
        const chooseCamera = document.getElementById('chooseCamera');
        const chooseUpload = document.getElementById('chooseUpload');
        const modalTitle = document.getElementById('modalTitle');
        const cameraContainer = document.getElementById('cameraContainer');
        const uploadContainer = document.getElementById('uploadContainer');
        const cameraView = document.getElementById('cameraView');
        const cameraCanvas = document.getElementById('cameraCanvas');
        const captureBtn = document.getElementById('captureBtn');
        const uploadArea = document.getElementById('uploadArea');
        const qrFileInput = document.getElementById('qrFileInput');
        const qrCanvas = document.getElementById('qrCanvas');
        const qrModalResult = document.getElementById('qrModalResult');

        let cameraStream = null;

        showQrOptions.addEventListener('click', () => qrChoiceModal.style.display = 'flex');

        closeChoiceModal.addEventListener('click', () => qrChoiceModal.style.display = 'none');
        closeModal.addEventListener('click', () => {
            qrModal.style.display = 'none';
            if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
        });

        backToChoice.addEventListener('click', () => {
            qrModal.style.display = 'none';
            qrChoiceModal.style.display = 'flex';
            if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
        });

        chooseCamera.addEventListener('click', () => {
            qrChoiceModal.style.display = 'none';
            qrModal.style.display = 'flex';
            cameraContainer.style.display = 'block';
            uploadContainer.style.display = 'none';
            modalTitle.textContent = 'Scan with Camera';
            startCamera();
        });

        chooseUpload.addEventListener('click', () => {
            qrChoiceModal.style.display = 'none';
            qrModal.style.display = 'flex';
            cameraContainer.style.display = 'none';
            uploadContainer.style.display = 'block';
            modalTitle.textContent = 'Upload QR Code';
            if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
        });

        async function startCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                cameraView.srcObject = cameraStream;
            } catch (err) {
                qrModalResult.innerHTML = '<span style="color:#e53e3e;">Camera access denied</span>';
            }
        }

        captureBtn.addEventListener('click', () => {
            if (!cameraStream) return;
            cameraCanvas.width = cameraView.videoWidth;
            cameraCanvas.height = cameraView.videoHeight;
            const ctx = cameraCanvas.getContext('2d');
            ctx.drawImage(cameraView, 0, 0, cameraCanvas.width, cameraCanvas.height);
            const imageData = ctx.getImageData(0, 0, cameraCanvas.width, cameraCanvas.height);
            const code = jsQR(imageData.data, cameraCanvas.width, cameraCanvas.height);
            if (code) processQRLogin(code.data);
            else qrModalResult.innerHTML = '<span style="color:#e53e3e;">No QR code found</span>';
        });

        uploadArea.addEventListener('click', () => qrFileInput.click());

        qrFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    qrCanvas.width = img.width;
                    qrCanvas.height = img.height;
                    const ctx = qrCanvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, img.width, img.height);
                    const imageData = ctx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
                    const code = jsQR(imageData.data, qrCanvas.width, qrCanvas.height);
                    if (code) processQRLogin(code.data);
                    else qrModalResult.innerHTML = '<span style="color:#e53e3e;">No QR code found</span>';
                };
            };
            reader.readAsDataURL(file);
        });

        async function processQRLogin(qrData) {
            if (qrData.startsWith('BYPRO:')) {
                const parts = qrData.split(':');
                if (parts.length === 3) {
                    const id = parts[1];
                    const password = parts[2];
                    
                    showLoading('Processing QR code');
                    
                    try {
                        await wakeUpServer();
                        
                        const response = await fetch(`${CONFIG.API_BASE}/api/verify-account`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ id, password })
                        });
                        
                        const result = await response.json();
                        
                        hideLoading();
                        
                        if (result.success) {
                            Session.save(result.account);
                            qrModalResult.innerHTML = '<span style="color:#2a6df4;">✅ Login successful!</span>';
                            qrModal.style.display = 'none';
                            if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
                            showLoggedInState(result.account);
                        } else {
                            qrModalResult.innerHTML = '<span style="color:#e53e3e;">❌ Invalid QR</span>';
                        }
                    } catch (error) {
                        hideLoading();
                        qrModalResult.innerHTML = '<span style="color:#e53e3e;">❌ Connection error</span>';
                    }
                }
            } else {
                qrModalResult.innerHTML = '<span style="color:#e53e3e;">❌ Invalid QR format</span>';
            }
        }

        // ==================== Initialize ====================
        document.addEventListener('DOMContentLoaded', () => {
            attemptAutoLogin();
        });
    </script>
</body>
</html>
